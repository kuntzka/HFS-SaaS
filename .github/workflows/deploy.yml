name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  API_IMAGE: hfs-api

jobs:
  push-image:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build & Push
        run: |
          docker build -f src/HFS.Api/Dockerfile -t $REGISTRY/$API_IMAGE:${{ github.sha }} -t $REGISTRY/$API_IMAGE:latest .
          docker push $REGISTRY/$API_IMAGE:${{ github.sha }}
          docker push $REGISTRY/$API_IMAGE:latest

  deploy-api:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: push-image
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name hfs-api \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}

  deploy-frontend:
    name: Deploy Frontend to Static Web Apps
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: npm ci && npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
